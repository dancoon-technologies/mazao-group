name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Use npm (not pnpm) so node_modules is flat and react-native-reanimated finds
      # react-native-worklets' libworklets.so in one place; pnpm's layout breaks the native link.
      - name: Install dependencies
        working-directory: mobile
        run: |
          pwd
          npm install

      - name: Build APK locally
        working-directory: mobile
        run: npx eas build --platform android --profile preview --local --non-interactive --output ./build/app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          # Inlined into the app at build time (Expo EXPO_PUBLIC_*)
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: mobile/build/app.apk
          retention-days: 7
