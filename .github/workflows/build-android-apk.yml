name: Build Android APK

# Push notifications: ensure Android FCM credentials are configured in your EAS project
# (Dashboard → Project → Credentials, or `eas credentials`). EAS Build uses them when
# building so the APK can receive Expo push notifications.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Verify EAS auth so the build fails fast with a clear error if EXPO_TOKEN is missing/invalid.
      # FCM for push: configure Android FCM in EAS for the "preview" profile (see mobile/docs/PUSH_NOTIFICATIONS_SETUP.md).
      - name: Verify EAS authentication
        working-directory: mobile
        run: npx -y eas-cli whoami --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # Use npm only; remove other lock files so expo doctor sees a single lock file.
      - name: Install dependencies
        working-directory: mobile
        run: |
          rm -f pnpm-lock.yaml yarn.lock
          npm install

      # EAS Build (local): EXPO_TOKEN authenticates to EAS so credentials (e.g. FCM for push)
      # are fetched and embedded in the APK. projectId is in app.json extra.eas.projectId.
      # NODE_ENV required by Expo CLI when bundling.
      # Retry once on failure (Gradle sometimes gets 502 from Google Maven).
      # Use npx -y eas-cli (full package name) so EAS runs from registry without being in package.json.
      # If this step fails: open the "Build APK locally" step in the Actions log and search for
      # "FAILURE:" or "What went wrong" to see the actual Gradle error.
      - name: Build APK locally
        working-directory: mobile
        run: |
          for i in 1 2; do
            npx -y eas-cli build --platform android --profile preview --local --non-interactive --output ./build/app.apk 2>&1 | tee ../build.log
            if [ ${PIPESTATUS[0]} -eq 0 ] || [ -f ./build/app.apk ]; then exit 0; fi
            echo "Build attempt $i failed, retrying in 30s..."
            sleep 30
          done
          exit 1
        env:
          NODE_ENV: production
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
          # More Gradle heap and no daemon for clearer CI logs
          GRADLE_OPTS: -Xmx3584m -Dfile.encoding=UTF-8 -Dorg.gradle.daemon=false

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-apk
          path: mobile/build/app.apk
          retention-days: 7
