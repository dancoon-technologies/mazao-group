name: CI/CD

on:
  push:
    paths:
      - "backend/**"
      - "web/**"
      - "mobile/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect folder changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - "backend/**"
            web:
              - "web/**"
            mobile:
              - "mobile/**"

  backend-tests:
    name: Backend tests
    needs: detect
    if: needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: backend
        run: |
          python manage.py test


# -------------------------------------------------
# Web Tests
# -------------------------------------------------
  web-tests:
    name: Web tests
    needs: detect
    if: needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        working-directory: web
        run: pnpm test

  mobile-tests:
    name: Mobile tests
    needs: detect
    if: needs.detect.outputs.mobile == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest' 

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Install dependencies
        working-directory: mobile
        run: pnpm install

      - name: Run mobile tests
        working-directory: mobile
        run: pnpm test

  backend-deploy:
    name: Deploy backend
    needs: [detect, backend-tests]
    if: github.ref == 'refs/heads/main' && needs.detect.outputs.backend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: ${{ secrets.PORT }}
          script: |
            cd /var/www/mazao-group/backend
            source .venv/bin/activate
            git pull origin main
            pip install -r requirements.txt
            python manage.py migrate
            python manage.py collectstatic --noinput
            cd ..
            pm2 restart all


  web-deploy:
    name: Deploy web (Vercel)
    needs: [detect, web-tests]
    if: github.ref == 'refs/heads/main' && needs.detect.outputs.web == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "latest"

      - name: Deploy to Vercel
        working-directory: web
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}


  mobile-build:
    name: Build Android APK
    needs: [detect, mobile-tests]
    if: always() && !cancelled() && ((github.ref == 'refs/heads/main' && needs.detect.outputs.mobile == 'true' && needs.mobile-tests.result == 'success') || (github.event_name == 'workflow_dispatch' && (needs.mobile-tests.result == 'success' || needs.mobile-tests.result == 'skipped')))
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 'latest'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify EAS login
        working-directory: mobile
        run: npx -y eas-cli whoami --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: pnpm install

      - name: Build Android APK
        working-directory: mobile
        run: |
          npx -y eas-cli build \
            --platform android \
            --profile preview \
            --local \
            --non-interactive \
            --output ./build/app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          NODE_ENV: production
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: mobile/build/app.apk
          retention-days: 7
