# Nginx server block for Mazao backend (Django + Gunicorn via PM2).
#
# Install: sudo cp backend/docs/nginx-mazao.conf /etc/nginx/sites-available/mazao
#          sudo ln -s /etc/nginx/sites-available/mazao /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace api.yourdomain.com and /var/www/mazao-group with your domain and app path.
# For SSL: certbot --nginx -d api.yourdomain.com (after this block is in place).

# Redirect HTTP to HTTPS (uncomment after SSL is set up)
# server {
#     listen 80;
#     server_name api.yourdomain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    server_name 165.22.75.186;

    # Increase body size for visit photo uploads (max 5MB)
    client_max_body_size 5M;

    # Django static files (after: python manage.py collectstatic --noinput)
    location /static/ {
        alias /var/www/mazao-group/backend/staticfiles/;
    }

    # Local media only (dev or if Spaces is disabled). With DigitalOcean Spaces, file URLs
    # are served from Spaces/CDN; you can remove this block in that case.
    location /media/ {
        alias /var/www/mazao-group/backend/media/;
    }

    # Proxy all other requests to Gunicorn (PM2 binds to 0.0.0.0:8000)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

